
networks:
  dmz:
    driver: bridge
  internal:
    driver: bridge

volumes:
  postgres_auth_data:
  postgres_level_data:
  postgres_balance_data:
  redis_data:
  kafka_data:
  zookeeper_data:

services:

  # ── Traefik (proxy / DMZ entry point) ─────────────────────────────
  traefik:
    image: traefik:v3.0
    container_name: traefik
    ports:
      - "80:80"
      - "8080:8080"   # dashboard, disable in prod
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/dynamic:/dynamic:ro
    networks:
      - dmz
      - internal

  # ── Auth Service ───────────────────────────────────────────────────
  auth_service:
    build: ./auth_service
    container_name: auth_service
    env_file: ./auth_service/.env
    depends_on:
      - postgres_auth
      - kafka
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=PathPrefix(`/auth`)"
      - "traefik.http.routers.auth.middlewares=strip-auth-prefix@file,dmz-headers@file"
      - "traefik.http.services.auth.loadbalancer.server.port=8000"

  postgres_auth:
    image: postgres:16-alpine
    container_name: postgres_auth
    env_file: ./auth_service/.env
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    networks:
      - internal

  # ── Level Service (base) ───────────────────────────────────────────
  level_service:
    build: ./level_service
    container_name: level_service
    env_file: ./level_service/.env
    depends_on:
      - postgres_level
      - kafka
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.level.rule=PathPrefix(`/level`)"
      - "traefik.http.routers.level.middlewares=auth-verify@file,strip-level-prefix@file"
      - "traefik.http.services.level.loadbalancer.server.port=8000"

  postgres_level:
    image: postgres:16-alpine
    container_name: postgres_level
    env_file: ./level_service/.env
    volumes:
      - postgres_level_data:/var/lib/postgresql/data
    networks:
      - internal

  # ── Balance Service (base) ─────────────────────────────────────────
  balance_service:
    build: ./balance_service
    container_name: balance_service
    env_file: ./balance_service/.env
    depends_on:
      - postgres_balance
      - kafka
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.balance.rule=PathPrefix(`/balance`) || PathPrefix(`/transactions`)"
      - "traefik.http.routers.balance.middlewares=auth-verify@file"
      - "traefik.http.services.balance.loadbalancer.server.port=8000"

  postgres_balance:
    image: postgres:16-alpine
    container_name: postgres_balance
    env_file: ./balance_service/.env
    volumes:
      - postgres_balance_data:/var/lib/postgresql/data
    networks:
      - internal

  # ── Leaderboard Service (base) ─────────────────────────────────────
  leaderboard_service:
    build: ./leaderboard_service
    container_name: leaderboard_service
    env_file: ./leaderboard_service/.env
    depends_on:
      - redis
      - kafka
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.leaderboard.rule=PathPrefix(`/leaderboard`)"
      - "traefik.http.routers.leaderboard.middlewares=auth-verify@file"
      - "traefik.http.services.leaderboard.loadbalancer.server.port=8000"

  # ── Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis_data:/data
    networks:
      - internal

  # ── Kafka + Zookeeper ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    volumes:
      - zookeeper_data:/var/lib/zookeeper
    networks:
      - internal

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - internal

  # ── Debezium ──────────────────────────────────────────────────────
  debezium:
    image: debezium/connect:2.6
    container_name: debezium
    depends_on:
      - kafka
      - postgres_auth
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium-group
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_status
    networks:
      - internal

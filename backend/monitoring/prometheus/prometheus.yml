global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "auth_service"
    static_configs:
      - targets: ["auth-service:8000"]
    metrics_path: /metrics

  - job_name: "level_service"
    static_configs:
      - targets: ["level-service:8000"]
    metrics_path: /metrics

  - job_name: "balance_service"
    static_configs:
      - targets: ["balance-service:8000"]
    metrics_path: /metrics

  - job_name: "leaderboard_service"
    static_configs:
      - targets: ["leaderboard-service:8000"]
    metrics_path: /metrics

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: "postgres_auth"
    static_configs:
      - targets: ["postgres-exporter-auth:9187"]

  - job_name: "postgres_level"
    static_configs:
      - targets: ["postgres-exporter-level:9187"]

  - job_name: "postgres_balance"
    static_configs:
      - targets: ["postgres-exporter-balance:9187"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
